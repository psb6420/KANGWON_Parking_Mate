app = "gangwon-parking-backend"
primary_region = "nrt"

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"

[[mounts]]
  source = "parking_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
