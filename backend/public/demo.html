<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>강원 Parking Mate — Arduino 실시간 데모</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #1a2332;
    }

    header {
      background: #1a2332;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-size: 22px; }
    header h1 { font-size: 18px; font-weight: 700; }
    header .sub { font-size: 13px; color: #8fa3b8; margin-top: 2px; }

    .live-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.4);
      animation: pulse 1.5s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    .live-dot.offline { background: #9ca3af; animation: none; box-shadow: none; }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: calc(100vh - 60px);
    }

    /* ── 왼쪽 패널 ── */
    .panel {
      background: #fff;
      border-right: 1px solid #e2e8f0;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .lot-header { display: flex; flex-direction: column; gap: 6px; }
    .lot-name { font-size: 17px; font-weight: 700; }
    .lot-address { font-size: 13px; color: #64748b; }
    .last-update { font-size: 12px; color: #94a3b8; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .stat-card {
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-card .num { font-size: 28px; font-weight: 800; }
    .stat-card .label { font-size: 12px; margin-top: 2px; }
    .stat-card.available { background: #f0fdf4; color: #16a34a; }
    .stat-card.occupied  { background: #fef2f2; color: #dc2626; }
    .stat-card.total     { background: #f1f5f9; color: #475569; }

    /* 슬롯 그리드 */
    .slots-title {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .slot-card {
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      border: 2px solid transparent;
      transition: all 0.3s ease;
      position: relative;
    }
    .slot-card.empty {
      background: #f0fdf4;
      border-color: #86efac;
    }
    .slot-card.occupied {
      background: #fef2f2;
      border-color: #fca5a5;
    }
    .slot-card.unknown {
      background: #f8fafc;
      border-color: #e2e8f0;
    }
    .slot-card .slot-id {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.03em;
    }
    .slot-card.empty    .slot-id { color: #16a34a; }
    .slot-card.occupied .slot-id { color: #dc2626; }
    .slot-card.unknown  .slot-id { color: #94a3b8; }

    .slot-card .slot-status {
      font-size: 11px;
      margin-top: 4px;
      font-weight: 600;
    }
    .slot-card.empty    .slot-status { color: #22c55e; }
    .slot-card.occupied .slot-status { color: #ef4444; }
    .slot-card.unknown  .slot-status { color: #94a3b8; }

    .slot-card .slot-dist {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .slot-card .car-icon {
      font-size: 20px;
      display: block;
      margin-bottom: 2px;
    }

    /* 깜빡임 효과 (업데이트될 때) */
    @keyframes flash {
      0%   { opacity: 1; }
      30%  { opacity: 0.3; }
      100% { opacity: 1; }
    }
    .slot-card.flash { animation: flash 0.4s ease; }

    .waiting-msg {
      text-align: center;
      padding: 30px;
      color: #94a3b8;
      font-size: 14px;
    }
    .waiting-msg .icon { font-size: 36px; margin-bottom: 10px; }

    /* ── 오른쪽: 지도 ── */
    #map { width: 100%; height: 100%; background: #e2e8f0; }
    .no-map {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #94a3b8;
      font-size: 14px;
      gap: 6px;
    }
    .no-map .coord { font-size: 12px; color: #cbd5e1; font-family: monospace; }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: auto 350px; }
      .panel { height: auto; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🅿</span>
  <div>
    <h1>강원 Parking Mate — Arduino 실시간 데모</h1>
    <div class="sub">초음파 센서 기반 주차면 점유 감지</div>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
    <div class="live-dot" id="liveDot"></div>
    <span style="font-size:12px;color:#8fa3b8;" id="liveStatus">연결 중...</span>
  </div>
</header>

<div class="layout">
  <!-- 왼쪽: 주차장 정보 + 슬롯 -->
  <div class="panel">
    <div class="lot-header">
      <div class="lot-name" id="lotName">–</div>
      <div class="lot-address" id="lotAddress">Arduino 데이터 대기 중</div>
      <div class="last-update">마지막 수신: <span id="lastUpdate">–</span></div>
    </div>

    <div class="stats">
      <div class="stat-card available">
        <div class="num" id="statAvailable">–</div>
        <div class="label">빈 자리</div>
      </div>
      <div class="stat-card occupied">
        <div class="num" id="statOccupied">–</div>
        <div class="label">주차 중</div>
      </div>
      <div class="stat-card total">
        <div class="num" id="statTotal">–</div>
        <div class="label">전체</div>
      </div>
    </div>

    <div class="slots-title">주차 슬롯 현황</div>
    <div id="slotsContainer">
      <div class="waiting-msg">
        <div class="icon">📡</div>
        Arduino 신호 대기 중...<br>
        <small>센서가 데이터를 보내면 자동으로 표시됩니다</small>
      </div>
    </div>
  </div>

  <!-- 오른쪽: 카카오 지도 -->
  <div id="map">
    <div class="no-map" id="mapPlaceholder">
      <span style="font-size:48px">🗺️</span>
      <span>지도 로딩 중...</span>
    </div>
  </div>
</div>

<script>
  // ── 상태 ──
  const state = {
    lots: {},     // lot_id → { name, address, lat, lng, slots: {} }
    mapObj: null,
    mapMarkers: {},
  };

  // ── SSE 연결 ──
  function connectSSE() {
    const es = new EventSource("/api/parking/status/live");

    es.onopen = () => {
      document.getElementById("liveDot").className = "live-dot";
      document.getElementById("liveStatus").textContent = "실시간 연결됨";
    };

    es.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === "init") handleInit(data);
      else if (data.type === "update") handleUpdate(data);
      else if (data.type === "empty") { /* 아직 데이터 없음 */ }
    };

    es.onerror = () => {
      document.getElementById("liveDot").className = "live-dot offline";
      document.getElementById("liveStatus").textContent = "연결 끊김 — 재연결 중...";
      es.close();
      setTimeout(connectSSE, 3000);
    };
  }

  function handleInit(data) {
    if (!state.lots[data.lot_id]) {
      state.lots[data.lot_id] = {
        name: data.name,
        address: data.address,
        lat: data.lat,
        lng: data.lng,
        slots: {},
      };
    }
    for (const s of data.slots) {
      state.lots[data.lot_id].slots[s.slot_no] = s;
    }
    render(data.lot_id, null);
    initMap(data.lat, data.lng, data.name);
  }

  function handleUpdate(data) {
    const { lot_id, slot_no, slotLabel, is_occupied, distance_cm, available, total, updated_at } = data;

    if (!state.lots[lot_id]) {
      state.lots[lot_id] = { name: `${lot_id} 주차장`, address: "–", lat: null, lng: null, slots: {} };
    }

    state.lots[lot_id].slots[slot_no] = { slot_no, slotLabel, is_occupied, distance_cm, updated_at };
    render(lot_id, slot_no);

    // 마지막 수신 시각
    document.getElementById("lastUpdate").textContent = new Date(updated_at).toLocaleTimeString("ko-KR");
  }

  // ── 렌더링 ──
  function render(lot_id, changedSlotNo) {
    const lot = state.lots[lot_id];
    if (!lot) return;

    const slots = Object.values(lot.slots).sort((a, b) => a.slot_no - b.slot_no);
    const available = slots.filter((s) => !s.is_occupied).length;
    const occupied = slots.filter((s) => s.is_occupied).length;

    document.getElementById("lotName").textContent = lot.name;
    document.getElementById("lotAddress").textContent = lot.address || "–";
    document.getElementById("statAvailable").textContent = available;
    document.getElementById("statOccupied").textContent = occupied;
    document.getElementById("statTotal").textContent = slots.length;

    const container = document.getElementById("slotsContainer");

    if (slots.length === 0) {
      container.innerHTML = `<div class="waiting-msg"><div class="icon">📡</div>Arduino 신호 대기 중...</div>`;
      return;
    }

    // 기존 그리드가 없으면 생성
    let grid = container.querySelector(".slots-grid");
    if (!grid) {
      container.innerHTML = "";
      grid = document.createElement("div");
      grid.className = "slots-grid";
      container.appendChild(grid);
    }

    for (const slot of slots) {
      const id = `slot-${lot_id}-${slot.slot_no}`;
      let card = document.getElementById(id);
      const isNew = !card;

      if (isNew) {
        card = document.createElement("div");
        card.id = id;
        card.className = "slot-card";
        grid.appendChild(card);
      }

      const statusClass = slot.is_occupied ? "occupied" : "empty";
      const icon = slot.is_occupied ? "🚗" : "✅";
      const statusText = slot.is_occupied ? "주차 중" : "비어있음";
      const distText = slot.distance_cm != null ? `${parseFloat(slot.distance_cm).toFixed(1)} cm` : "";

      card.className = `slot-card ${statusClass}${!isNew && slot.slot_no === changedSlotNo ? " flash" : ""}`;
      card.innerHTML = `
        <span class="car-icon">${icon}</span>
        <div class="slot-id">${slot.slotLabel || "A" + slot.slot_no}</div>
        <div class="slot-status">${statusText}</div>
        ${distText ? `<div class="slot-dist">${distText}</div>` : ""}
      `;
    }

    updateMapMarker(lot_id, available, slots.length);
  }

  // ── 카카오 지도 ──
  async function initMap(lat, lng, name) {
    if (state.mapObj || !lat || !lng) return;

    let kakaoKey = "";
    try {
      const cfg = await fetch("/api/config").then((r) => r.json());
      kakaoKey = cfg.kakaoJavascriptKey || "";
    } catch {}

    if (!kakaoKey) {
      document.getElementById("map").innerHTML = `
        <div class="no-map">
          <span style="font-size:36px">🗺️</span>
          <span>카카오 지도 키 미설정</span>
          <span class="coord">위도 ${lat} / 경도 ${lng}</span>
          <span class="coord">.env 에 KAKAO_JAVASCRIPT_KEY 추가 필요</span>
        </div>`;
      return;
    }

    const script = document.createElement("script");
    script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${kakaoKey}&autoload=false`;
    script.onload = () => {
      kakao.maps.load(() => {
        document.getElementById("map").innerHTML = "";
        const container = document.getElementById("map");
        const center = new kakao.maps.LatLng(lat, lng);
        const map = new kakao.maps.Map(container, { center, level: 4 });
        state.mapObj = map;

        // 주차장 마커
        const marker = new kakao.maps.Marker({ position: center, map });
        state.mapMarkers["_pin"] = marker;

        // 커스텀 오버레이
        const overlay = new kakao.maps.CustomOverlay({
          position: center,
          content: `<div id="mapOverlay" style="background:#fff;border:2px solid #1a2332;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.15)">${name}</div>`,
          yAnchor: 2.4,
          map,
        });
        state.mapMarkers["_overlay"] = overlay;
      });
    };
    document.head.appendChild(script);
  }

  function updateMapMarker(lot_id, available, total) {
    // 지도 오버레이 색상 업데이트
    const el = document.getElementById("mapOverlay");
    if (!el) return;
    const ratio = total > 0 ? available / total : 0;
    const color = ratio >= 0.5 ? "#16a34a" : ratio > 0 ? "#ca8a04" : "#dc2626";
    el.style.borderColor = color;
    el.style.color = color;
  }

  // ── 시작 ──
  connectSSE();
</script>
</body>
</html>
